<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/svg+xml" href="/leaf.svg" />
    <meta name="viewport" content="width=288, height=240, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script>
      (function () {
        var W = 288
        var H = 240
        // Measure host BEFORE locking the layout viewport to 288×240.
        var hostW = window.screen.width || window.outerWidth || window.innerWidth || W
        var hostH = window.screen.height || window.outerHeight || window.innerHeight || H
        var scale = Math.min(hostW / W, hostH / H)
        var meta = document.querySelector('meta[name="viewport"]')
        if (meta) {
          meta.setAttribute(
            'content',
            'width=' +
              W +
              ', height=' +
              H +
              ', initial-scale=' +
              scale +
              ', minimum-scale=' +
              scale +
              ', maximum-scale=' +
              scale +
              ', user-scalable=no, viewport-fit=cover',
          )
        }
      })()
    </script>
    <title>AQI Monitor - Lucknow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
